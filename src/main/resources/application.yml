# ============================================================
# Java AI Knowledge Base Starter - Demo 应用配置
# ============================================================
# 本文件只放通用默认配置，敏感参数（API Key、DB 密码）请放在
# application-dev.yml / application-prod.yml 中，且不要提交到 git
# ============================================================

spring:
  application:
    name: ai-kb-demo-server

  # ---------------- 数据源 ----------------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/ai_kb}
    username: ${SPRING_DATASOURCE_USERNAME:ai_kb}
    password: ${SPRING_DATASOURCE_PASSWORD:${AI_KB_DB_PASSWORD:ai_kb_demo_2026}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    baseline-on-migrate: true

  # ---------------- Redis ----------------
  data:
    redis:
      host: ${SPRING_REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
      port: ${SPRING_REDIS_PORT:${SPRING_DATA_REDIS_PORT:16379}}
      timeout: 3s

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  global-config:
    banner: false
  configuration:
    map-underscore-to-camel-case: true

# ---------------- LangChain4j ----------------
langchain4j:
  open-ai:
    chat-model:
      # 默认占位，请在 application-dev.yml 中覆盖为真实值
      api-key: ${AI_KB_LLM_API_KEY:please-override-me}
      base-url: ${AI_KB_LLM_BASE_URL:https://api.deepseek.com}
      model-name: ${AI_KB_CHAT_MODEL:Qwen/Qwen2.5-7B-Instruct}
      temperature: 0.3
      timeout: PT60S
      # 避免上传资料和完整 Prompt 被写入容器日志
      log-requests: false
      log-responses: false
    embedding-model:
      api-key: ${AI_KB_EMBEDDING_API_KEY:please-override-me}
      base-url: ${AI_KB_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
      model-name: ${AI_KB_EMBEDDING_MODEL:BAAI/bge-m3}
      timeout: PT30S

# ---------------- 服务器 ----------------
server:
  port: 8080
  compression:
    enabled: true

# ---------------- 监控 ----------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ---------------- 应用自定义 ----------------
ai-kb:
  security:
    jwt:
      secret: ${AI_KB_JWT_SECRET:change-me-in-production-default-demo-secret-do-not-use}
      expiration-minutes: 10080
  upload:
    root-dir: ${AI_KB_UPLOAD_DIR:./data/uploads}
    allowed-ext:
      - md
      - txt
      - pdf
  text-splitter:
    chunk-size: 800
    overlap: 120
  chat:
    # 免费 Demo 的列表查询保护上限，避免一次性返回过多历史消息或调用记录
    max-list-results: ${AI_KB_CHAT_MAX_LIST_RESULTS:100}
  vector:
    # pgvector 向量存储配置（由 infrastructure.vector 读取并构建 EmbeddingStore Bean）
    host: ${AI_KB_VECTOR_HOST:localhost}
    port: ${AI_KB_VECTOR_PORT:15432}
    database: ${AI_KB_VECTOR_DATABASE:ai_kb}
    user: ${AI_KB_VECTOR_USER:ai_kb}
    password: ${SPRING_DATASOURCE_PASSWORD:${AI_KB_DB_PASSWORD:ai_kb_demo_2026}}
    table: kb_embeddings
    dimension: 1024           # 匹配 bge-m3
    create-table: true
    drop-table-first: false

logging:
  level:
    root: INFO
    com.brolei.aikb: INFO
    dev.langchain4j: INFO
